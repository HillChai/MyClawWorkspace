<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Chat</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Todo</h1>
        <form id="add-form" class="row">
          <input id="todo-input" type="text" placeholder="输入待办事项" required />
          <button type="submit">新增</button>
        </form>
        <ul id="todo-list" class="list"></ul>
      </section>

      <section class="panel">
        <h2>Chat 命令</h2>
        <form id="chat-form" class="row">
          <input id="chat-input" type="text" placeholder='例如: "add buy milk" / "list"' required />
          <button type="submit">发送</button>
        </form>
        <pre id="chat-output" class="output">等待输入命令...</pre>
      </section>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
